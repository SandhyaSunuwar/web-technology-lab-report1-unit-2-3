<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="/css/sandhya_25_qno13.css">
</head>
<body>
    <div class="main-container">
        <h1>REGISTRATION / LOGIN FORM</h1>
        
        <div class="forms-wrapper">
            <section class="form-box">
                <h2>Register Form :</h2>
                <form>
                    <input type="text" placeholder="Username" required>
                    <input type="email" placeholder="Email" required>
                    <small>Please enter a valid email address</small>
                    
                    <input type="password" placeholder="Password" required>
                    <small>Minimum of 6 characters</small>
                    
                    <input type="password" placeholder="Confirm password" required>
                    
                    <div class="radio-group">
                        <label><input type="radio" name="gender"> Female</label>
                        <label><input type="radio" name="gender"> Male</label>
                    </div>
                    
                    <div class="checkbox-group">
                        <label><input type="checkbox"> I have read and accept terms of use.</label>
                    </div>
                    
                    <button type="submit" class="btn-yellow">SUBMIT</button>
                </form>
            </section>

            <section class="form-box">
                <h2>Login form :</h2>
                <form>
                    <input type="email" placeholder="Enter Your Email" required>
                    <input type="password" placeholder="Password" required>
                    
                    <div class="checkbox-group">
                        <label><input type="checkbox"> Remember me</label>
                    </div>
                    
                    <button type="submit" class="btn-yellow">LOGIN</button>
                </form>
            </section>
        </div>
        <footer>
            <p>© 2016 Registration / Login form. All Rights Reserved. Design by W3layouts</p>
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect</title>
    <link rel="stylesheet" href="/css/sandhya_25_qno20.css">
</head>
<body>

    <header>
        <h1>IT 237: Web Technology I</h1>
        <h3>HOVER-EFFECT CSS</h3>
    </header>

    <div class="gallery-container">
        <div class="box h-zoomin">
            <div class="img-wrapper"><img src="/images/branch.avif"></div>
            <p>Hover-ZoomIn</p>
        </div>

        <div class="box h-fade">
            <div class="img-wrapper"><img src="/images/flower.jpg"></div>
            <p>Hover-Fade</p>
        </div>

        <div class="box h-blur">
            <div class="img-wrapper">
                <div class="blur-text">Hover Blur</div>
                <img src="/images/pond.jpg">
            </div>
            <p>Hover-Blur</p>
        </div>

        <div class="box h-mask">
            <div class="img-wrapper"><img src="/images/temple.avif"></div>
            <p>Hover-Mask</p>
        </div>

        <div class="box h-zoomout">
            <div class="img-wrapper"><img src="/images/waterfall.jpg"></div>
            <p>Hover-Zoomout</p>
        </div>

        <div class="box h-blurout">
            <div class="img-wrapper"><img src="/images/lake.jpg"></div>
            <p>Hover-Blurout</p>
        </div>

        <div class="box h-overlay">
            <div class="img-wrapper">
                <div class="overlay-content">Overlay Text</div>
                <img src="/images/mountain.webp">
            </div>
            <p>Overlay Text</p>
        </div>

        <div class="box h-fall">
            <div class="img-wrapper"><img src="/images/sun.jpg"></div>
            <p>Hover-Fall</p>
        </div>
    </div>

</body>
</html>

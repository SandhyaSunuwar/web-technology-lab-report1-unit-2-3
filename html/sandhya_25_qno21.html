<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loksewa Form</title>
    <link rel="stylesheet" href="/css/sandhya_25_qno21.css">
</head>
<body>

<div class="registration-card">
    <div class="header">
        <img src="/images/logo.svg" alt="Nepal Logo" class="logo">
        <h2>Public Service Commission</h2>
    </div>

    <h3 class="form-title">Register</h3>

    <form>
        <div class="row">
            <div class="col">
                <label>First Name *</label>
                <input type="text" required>
            </div>
            <div class="col">
                <label>Middle Name</label>
                <input type="text">
            </div>
            <div class="col">
                <label>Surname *</label>
                <input type="text" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Username *</label>
                <input type="text" required>
            </div>
            <div class="col">
                <label>Date of Birth (B.S.) *</label>
                <input type="date" required>
            </div>
            <div class="col">
                <label>Date of Birth (A.D.) *</label>
                <input type="date" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Gender *</label>
                <div class="radio-group">
                    <input type="radio" name="gender" id="male" checked> <label for="male">Male</label>
                    <input type="radio" name="gender" id="female"> <label for="female">Female</label>
                    <input type="radio" name="gender" id="other"> <label for="other">Other</label>
                </div>
            </div>
            <div class="col-double">
                <label>Email *</label>
                <input type="email" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Mobile Number *</label>
                <input type="tel" required>
            </div>
            <div class="col">
                <label>National ID Number</label>
                <input type="text">
            </div>
            <div class="col">
                <label>Citizenship Number *</label>
                <input type="text" required>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label>Citizenship Issuing District *</label>
                <select required>
                    <option value="">Select an option ...</option>
                    <option value="kathmandu">Kathmandu</option>
                    <option value="lalitpur">Lalitpur</option>
                    <option value="Bhaktapur">Bhaktapur</option>
                </select>
            </div>
            <div class="col">
                <label>Citizenship Issued Date (B.S.) *</label>
                <input type="date" required>
            </div>
            <div class="col">
                <label>Citizenship Issued Date (A.D.) *</label>
                <input type="date" required>
            </div>
        </div>

        <div class="footer-buttons">
            <button type="button" class="btn-secondary">Back to Login</button>
            <button type="submit" class="btn-primary">Submit</button>
        </div>
    </form>
</div>

</body>
</html>

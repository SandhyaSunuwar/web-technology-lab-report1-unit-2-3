<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Overlay</title>
    <link rel="stylesheet" href="/css/sandhya_25_qno18.css">
</head>
<body>
    
<div class="main-wrapper">
    <h2>Show Text On Image Hover</h2>
    
    <div class="image-card">
        <img src="/images/tree.jpg" alt="Tree" height="600px "width="450px">
        
        <div class="overlay">
            <div class="content">
                <h3>Card Title</h3>
                <p>This is a simple card description</p>
                <button>Read More</button>
            </div>
        </div>
    </div>
    
    <p class="footer-text"><strong>HTML & CSS</strong></p>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
     <style>
        table {
            width: 300px;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        th, td {
            border: 3px solid black;
            padding: 10px;
        }
        .header-row {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th colspan="7">Time Table</th>
        </tr>

        <tr class="header-row">
            <td rowspan="6">Hours</td>
            <td>Mon</td>
            <td>Tue</td>
            <td>Wed</td>
            <td>Thu</td>
            <td>Fri</td>
        </tr>

        <tr>
            <td>Math</td>
            <td>Science</td>
            <td>Math</td>
            <td>Science</td>
            <td>Arts</td>
        </tr>

        <tr>
            <td>Math</td>
            <td>Science</td>
            <td>Math</td>
            <td>Science</td>
            <td>Arts</td>
        </tr>

        <tr>
            <td colspan="5" style="font-weight: bold;">Lunch</td>
        </tr>

        <tr>
            <td>Math</td>
            <td>Science</td>
            <td>Math</td>
            <td colspan="2"  rowspan="2" style="font-weight: bold;">Project</td>
        </tr>

        <tr>
            <td>Math</td>
            <td>Science</td>
            <td>Math</td>
        </tr>
    </table>

</body>
</html>
